<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TIS Broker - Hệ thống Bảo hiểm Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header-placeholder"></header>

    <main>
        <section class="hero-section">
            <div class="hero-overlay">
                <div class="container">
                    <div class="row align-items-center min-vh-100">
                        <div class="col-lg-6 animate-up">
                            <h1 class="display-3 fw-bold text-white mb-4">An tâm vững bước<br>Cùng TIS Broker</h1>
                            <p class="lead text-white opacity-75 mb-5">Giải pháp bảo hiểm số hóa 4.0 cho Doanh nghiệp và Cá nhân.</p>
                            <div class="d-flex gap-3">
                                <a href="#products" class="btn btn-tis btn-tis-primary btn-lg">Mua bảo hiểm ngay</a>
                                <a href="register.html" class="btn btn-tis btn-outline-light btn-lg">Tham gia với chúng tôi</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-5" id="products">
            <div class="container py-5">
                <div class="d-flex justify-content-between align-items-end mb-5">
                    <div>
                        <h2 class="fw-bold">Bảo hiểm Doanh nghiệp</h2>
                        <p class="text-muted">Giải pháp tối ưu cho tổ chức</p>
                    </div>
                    <a href="products.html?type=enterprise" class="text-danger fw-bold text-decoration-none">Xem tất cả</a>
                </div>
                <div class="row g-4" id="enterprise-products">
                    </div>
            </div>
        </section>

        <section class="bg-light py-5">
            <div class="container py-5">
                <h2 class="text-center fw-bold mb-5">Tin tức mới nhất</h2>
                <div class="row g-4" id="news-list"></div>
            </div>
        </section>
    </main>

    <div class="mini-chat-box shadow-lg" id="mini-chat">
        <div class="chat-header">
            <span>Hỗ trợ TIS 24/7</span>
            <button class="btn-close btn-close-white" onclick="toggleChat()"></button>
        </div>
        <div class="chat-body" id="chat-messages">
            <p class="text-muted small">Chào bạn! TIS có thể giúp gì cho bạn?</p>
        </div>
        <div class="chat-footer">
            <input type="text" placeholder="Nhập tin nhắn..." class="form-control form-control-sm">
            <button class="btn btn-danger btn-sm"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <div class="chat-trigger" onclick="toggleChat()">
        <i class="fas fa-comments"></i>
    </div>

    <footer id="footer-placeholder"></footer>

    <script src="js/layout.js"></script>
    <script>
        function toggleChat() {
            document.getElementById('mini-chat').classList.toggle('active');
        }
    </script>
</body>
</html>
