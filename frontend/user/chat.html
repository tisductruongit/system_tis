<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hỗ trợ trực tuyến - TIS Broker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .chat-container { height: calc(100vh - 180px); background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .chat-sidebar { border-right: 1px solid #eee; height: 100%; overflow-y: auto; background-color: #fcfcfc; }
        .chat-ticket { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; transition: 0.2s; }
        .chat-ticket:hover, .chat-ticket.active { background-color: #ffeaea; border-right: 3px solid #D71920; }
        
        .chat-main { display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #eee; background: #fff; }
        .chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; background-color: #f8f9fa; }
        
        .msg-bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; margin-bottom: 15px; width: fit-content; word-wrap: break-word;}
        .msg-user { background-color: #D71920; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .msg-staff { background-color: #e9ecef; color: #333; margin-right: auto; border-bottom-left-radius: 2px; }
        
        .chat-input-area { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-area input { border-radius: 20px; }
    </style>
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <main class="container" style="margin-top: 100px; margin-bottom: 40px;">
        <h4 class="fw-bold mb-3"><i class="fas fa-headset text-danger me-2"></i>Trung tâm hỗ trợ</h4>
        
        <div class="row g-0 chat-container">
            <div class="col-md-4 chat-sidebar" id="ticket-list">
                <div class="text-center p-4 text-muted"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>
            </div>

            <div class="col-md-8 chat-main">
                <div class="chat-header d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-0 fw-bold" id="chat-title">Chọn một phiên tư vấn</h6>
                        <small class="text-muted" id="chat-status">--</small>
                    </div>
                </div>

                <div class="chat-messages" id="chat-box">
                    <div class="h-100 d-flex align-items-center justify-content-center text-muted flex-column">
                        <i class="far fa-comments fa-3x mb-2" style="opacity: 0.3;"></i>
                        <p>Vui lòng chọn một yêu cầu hỗ trợ bên trái để xem tin nhắn.</p>
                    </div>
                </div>

                <form class="chat-input-area" id="chat-form" style="display: none;" onsubmit="sendMessage(event)">
                    <input type="text" id="msg-input" class="form-control" placeholder="Nhập tin nhắn của bạn..." autocomplete="off">
                    <button type="submit" class="btn btn-danger rounded-circle" style="width: 40px; height: 40px;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/layout.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
