<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - TIS Broker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .qty-input { width: 60px !important; text-align: center; }
        .cart-empty-icon { font-size: 5rem; color: #dee2e6; }
    </style>
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <main class="container py-5" style="margin-top: 80px;">
        <h3 class="fw-bold mb-4">Giỏ hàng của bạn</h3>
        
        <div class="row" id="cart-container">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-danger" role="status"></div>
                <p class="mt-2 text-muted">Đang tải dữ liệu...</p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="../js/common.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/layout.js"></script> <script src="js/cart.js"></script>
</body>
</html>
