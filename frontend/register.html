<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - TIS Broker</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-banner">
            <div id="banner-slideshow" class="banner-slideshow">
                <div class="banner-slide active" style="background-image: url('https://img.freepik.com/free-photo/shield-icon-cyber-security-digital-data-protection-concept_53876-120614.jpg');"></div>
            </div>
            <div class="auth-banner-overlay">
                <img src="logo.jpg" alt="TIS Logo" class="auth-logo bg-white p-2 rounded mb-4" style="height: 60px;">
                <h1>Giải pháp Bảo hiểm<br>Toàn diện</h1>
                <p>Đăng ký ngay để trải nghiệm dịch vụ chăm sóc khách hàng đặc quyền từ TIS Broker.</p>
            </div>
        </div>

        <div class="auth-form-area" style="overflow-y: auto;">
            <div class="mb-4">
                <h3 class="fw-bold text-dark m-0">Tạo tài khoản mới</h3>
                <p class="text-muted mt-1">Vui lòng điền thông tin chính xác để hệ thống hỗ trợ tốt nhất.</p>
            </div>

            <form id="register-form">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="fw-bold small mb-1">Loại khách hàng</label>
                        <select id="role" class="form-select" onchange="toggleEnterprise()" required>
                            <option value="business">Doanh nghiệp / Tổ chức</option>
                            <option value="individual" selected>Khách hàng Cá nhân</option>
                        </select>
                    </div>

                    <div id="enterprise-fields" class="col-12 row g-3 m-0 p-0" style="display: none;">
                        <div class="col-12 mt-3 p-0">
                            <label class="fw-bold small mb-1">Mã số thuế <span class="text-danger">*</span></label>
                            <input type="text" id="tax_code" class="form-control" placeholder="Nhập Mã số thuế">
                        </div>
                        <div class="col-12 mt-3 p-0">
                            <label class="fw-bold small mb-1">Tên Doanh nghiệp <span class="text-danger">*</span></label>
                            <input type="text" id="company_name" class="form-control" placeholder="Nhập tên Công ty">
                        </div>
                    </div>

                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Tên đăng nhập <span class="text-danger">*</span></label>
                        <input type="text" id="username" class="form-control" placeholder="Viết liền không dấu" required>
                    </div>
                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="tel" id="phone" class="form-control" placeholder="SĐT liên hệ" required>
                    </div>

                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
                    </div>
                    
                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại" required>
                    </div>
                </div>

                <button type="submit" id="btn-register" class="btn btn-primary w-100 p-3 fw-bold mt-4" style="background-color: #d71920; border-color: #d71920;">ĐĂNG KÝ TÀI KHOẢN</button>
                
                <div class="text-center mt-4">
                    <span class="text-muted">Đã có tài khoản?</span> 
                    <a href="login.html" class="text-danger text-decoration-none fw-bold">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function toggleEnterprise() {
            const role = document.getElementById('role').value;
            document.getElementById('enterprise-fields').style.display = role === 'business' ? 'flex' : 'none';
        }

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                Swal.fire('Lỗi', 'Mật khẩu xác nhận không khớp!', 'warning');
                return;
            }

            const payload = {
                username: document.getElementById('username').value,
                phone: document.getElementById('phone').value,
                password: password,
                role: document.getElementById('role').value,
            };

            if (payload.role === 'business') {
                payload.tax_code = document.getElementById('tax_code').value;
                payload.company_name = document.getElementById('company_name').value;
                if (!payload.tax_code || !payload.company_name) {
                    Swal.fire('Lỗi', 'Doanh nghiệp cần nhập đủ MST và Tên công ty!', 'warning');
                    return;
                }
            }

            const btn = document.getElementById('btn-register');
            btn.innerHTML = 'Đang xử lý...'; btn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/api/users/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    Swal.fire('Thành công', 'Đăng ký thành công! Đang chuyển hướng...', 'success').then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    const errorData = await response.json();
                    let errMsg = 'Tài khoản hoặc SĐT đã tồn tại!';
                    if(errorData.username) errMsg = "Username đã có người sử dụng.";
                    Swal.fire('Lỗi', errMsg, 'error');
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Lỗi kết nối máy chủ!', 'error');
            } finally {
                btn.innerHTML = 'ĐĂNG KÝ TÀI KHOẢN'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
