<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - TIS Broker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-banner">
            <div id="banner-slideshow" class="banner-slideshow"></div>
            <div class="auth-banner-overlay">
                <img src="images/logo.png" alt="TIS Logo" class="auth-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/200x60/d71920/ffffff?text=TIS+BROKER';">
                <h1>Giải pháp Bảo hiểm<br>Toàn diện cho Doanh nghiệp</h1>
                <p>Đăng ký ngay để trải nghiệm dịch vụ chăm sóc khách hàng đặc quyền từ TIS Broker.</p>
            </div>
        </div>

        <div class="auth-form-area">
            <div class="mb-4">
                <h3 class="fw-bold text-dark m-0">Tạo tài khoản mới</h3>
                <p class="text-muted mt-1">Vui lòng điền thông tin chính xác để hệ thống hỗ trợ tốt nhất.</p>
            </div>

            <form id="register-form">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="fw-bold small mb-1">Loại khách hàng</label>
                        <select id="user_type" class="form-select" required>
                            <option value="enterprise" selected>Doanh nghiệp / Tổ chức</option>
                            <option value="individual">Khách hàng Cá nhân</option>
                        </select>
                    </div>

                    <div id="enterprise-fields" class="col-12 row g-3 m-0 p-0">
                        <div class="col-12 mt-3 p-0">
                            <label class="fw-bold small mb-1">Mã số thuế <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" id="tax_code" class="form-control" placeholder="Nhập MST để tự động điền" required>
                                <button type="button" id="btn-lookup-mst" class="btn btn-outline-danger px-4 fw-bold">Tra cứu</button>
                            </div>
                        </div>
                        <div class="col-12 mt-3 p-0">
                            <label class="fw-bold small mb-1">Tên Doanh nghiệp <span class="text-danger">*</span></label>
                            <input type="text" id="company_name" class="form-control" placeholder="Tên công ty sẽ hiện ở đây..." required readonly>
                        </div>
                    </div>

                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Người đại diện <span class="text-danger">*</span></label>
                        <input type="text" id="first_name" class="form-control" placeholder="Họ và Tên" required>
                    </div>
                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="text" id="phone" class="form-control" placeholder="SĐT dùng để đăng nhập" required>
                    </div>

                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Mật khẩu <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" id="password" class="form-control border-end-0" placeholder="Mật khẩu" required>
                            <span class="input-group-text bg-white cursor-pointer toggle-password" data-target="password"><i class="fas fa-eye text-muted"></i></span>
                        </div>
                        <div class="progress mt-2" id="password-strength-container" style="height: 6px; display: none;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" id="password-strength-bar" role="progressbar" style="width: 0%;"></div>
                        </div>
                        <small id="password-strength-text" class="mt-1 fw-bold" style="font-size: 0.75rem; display: none;"></small>
                    </div>
                    
                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" id="confirm_password" class="form-control border-end-0" placeholder="Nhập lại" required>
                            <span class="input-group-text bg-white cursor-pointer toggle-password" data-target="confirm_password"><i class="fas fa-eye text-muted"></i></span>
                        </div>
                    </div>
                </div>

                <button type="submit" id="btn-register" class="btn btn-primary w-100 p-3 fw-bold mt-4">ĐĂNG KÝ TÀI KHOẢN</button>
                
                <div class="text-center mt-4">
                    <span class="text-muted">Đã có tài khoản?</span> 
                    <a href="login.html" class="text-danger text-decoration-none fw-bold">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/common.js"></script>
    <script src="js/auth-banner.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
