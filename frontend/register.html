<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - TIS Broker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-banner">
            <div id="banner-slideshow" class="banner-slideshow">
                <div class="banner-slide active" style="background-image: url('https://img.freepik.com/free-photo/shield-icon-cyber-security-digital-data-protection-concept_53876-120614.jpg');"></div>
            </div>
            <div class="auth-banner-overlay">
                <img src="logo.jpg" alt="TIS Logo" class="auth-logo bg-white p-2 rounded mb-4" style="height: 60px;">
                <h1>Giải pháp Bảo hiểm<br>Toàn diện</h1>
                <p>Đăng ký ngay để trải nghiệm dịch vụ chăm sóc khách hàng đặc quyền từ TIS Broker.</p>
            </div>
        </div>

        <div class="auth-form-area" style="overflow-y: auto;">
            <div class="mb-4">
                <h3 class="fw-bold text-dark m-0">Tạo tài khoản mới</h3>
                <p class="text-muted mt-1">Vui lòng điền thông tin chính xác để hệ thống hỗ trợ tốt nhất.</p>
            </div>

            <form id="register-form">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="fw-bold small mb-1">Loại khách hàng</label>
                        <select id="role" class="form-select" onchange="toggleEnterprise()" required>
                            <option value="individual" selected>Khách hàng Cá nhân</option>
                            <option value="business">Doanh nghiệp / Tổ chức</option>
                        </select>
                    </div>

                    <div id="enterprise-fields" class="col-12 row g-3 m-0 p-0" style="display: none;">
                        <div class="col-12 mt-3 p-0">
                            <label class="fw-bold small mb-1">Mã số thuế <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" id="tax_code" class="form-control" placeholder="Nhập Mã số thuế">
                                <button type="button" id="btn-lookup-mst" class="btn btn-outline-danger px-4 fw-bold">Tra cứu</button>
                            </div>
                        </div>
                        <div class="col-12 mt-3 p-0">
                            <label class="fw-bold small mb-1">Tên Doanh nghiệp <span class="text-danger">*</span></label>
                            <input type="text" id="company_name" class="form-control" placeholder="Tên công ty sẽ hiện sau khi tra cứu..." readonly>
                        </div>
                    </div>

                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Tên đăng nhập <span class="text-danger">*</span></label>
                        <input type="text" id="username" class="form-control" placeholder="Viết liền không dấu" required>
                    </div>
                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="tel" id="phone" class="form-control" placeholder="SĐT liên hệ" required>
                    </div>

                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
                    </div>
                    
                    <div class="col-md-6 mt-3">
                        <label class="fw-bold small mb-1">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" required>
                    </div>
                </div>

                <button type="submit" id="btn-register" class="btn btn-primary w-100 p-3 fw-bold mt-4" style="background-color: #d71920; border-color: #d71920;">ĐĂNG KÝ TÀI KHOẢN</button>
                
                <div class="text-center mt-4">
                    <span class="text-muted">Đã có tài khoản?</span> 
                    <a href="login.html" class="text-danger text-decoration-none fw-bold">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const BASE_URL = 'http://127.0.0.1:8000/api';

        // 1. Chuyển đổi hiển thị giữa Cá nhân và Doanh nghiệp
        function toggleEnterprise() {
            const role = document.getElementById('role').value;
            const enterpriseFields = document.getElementById('enterprise-fields');
            const taxInput = document.getElementById('tax_code');
            const companyInput = document.getElementById('company_name');

            if (role === 'business') {
                enterpriseFields.style.display = 'flex';
                taxInput.required = true;
                companyInput.required = true;
            } else {
                enterpriseFields.style.display = 'none';
                taxInput.required = false;
                companyInput.required = false;
                taxInput.value = '';
                companyInput.value = '';
            }
        }

        // 2. Logic Tra cứu Mã số thuế tự động điền tên doanh nghiệp
        document.getElementById('btn-lookup-mst').addEventListener('click', async function() {
            const taxCode = document.getElementById('tax_code').value;
            const companyInput = document.getElementById('company_name');
            const btn = this;

            if (!taxCode) {
                Swal.fire('Thông báo', 'Vui lòng nhập mã số thuế để tra cứu!', 'warning');
                return;
            }

            try {
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
                btn.disabled = true;

                // Sử dụng API VietQR để lấy thông tin doanh nghiệp
                const response = await fetch(`https://api.vietqr.io/v2/business/${taxCode}`);
                const data = await response.json();

                if (data.code === '00' && data.data) {
                    companyInput.value = data.data.name;
                    Swal.fire('Thành công', 'Đã xác thực thông tin doanh nghiệp!', 'success');
                } else {
                    Swal.fire('Lỗi', 'Không tìm thấy MST này. Vui lòng kiểm tra lại!', 'error');
                    companyInput.value = '';
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Không thể kết nối máy chủ tra cứu!', 'error');
            } finally {
                btn.innerHTML = 'Tra cứu';
                btn.disabled = false;
            }
        });

        // 3. Xử lý Gửi Form Đăng ký
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                Swal.fire('Lỗi', 'Mật khẩu xác nhận không khớp!', 'warning');
                return;
            }

            const payload = {
                username: document.getElementById('username').value,
                phone: document.getElementById('phone').value,
                password: password,
                role: document.getElementById('role').value
            };

            if (payload.role === 'business') {
                payload.tax_code = document.getElementById('tax_code').value;
                payload.company_name = document.getElementById('company_name').value;
            }

            const btn = document.getElementById('btn-register');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang đăng ký...';
            btn.disabled = true;

            try {
                const response = await fetch(`${BASE_URL}/users/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    Swal.fire('Thành công', 'Đăng ký thành công! Đang chuyển hướng đến đăng nhập...', 'success').then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    const errorData = await response.json();
                    let errMsg = 'Có lỗi xảy ra, vui lòng kiểm tra lại thông tin!';
                    if(errorData.username) errMsg = "Tên đăng nhập đã tồn tại!";
                    if(errorData.phone) errMsg = "Số điện thoại đã được sử dụng!";
                    Swal.fire('Lỗi', errMsg, 'error');
                }
            } catch (error) {
                Swal.fire('Lỗi', 'Không thể kết nối đến máy chủ Backend!', 'error');
            } finally {
                btn.innerHTML = 'ĐĂNG KÝ TÀI KHOẢN';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
