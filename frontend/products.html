<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm - TIS Insurance</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/product.css"> 
</head>
<body class="bg-light">

    <div id="header-placeholder"></div>

    <div class="container-fluid bg-white py-4 shadow-sm mb-4 border-bottom position-relative overflow-hidden">
        <div class="container position-relative z-1">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-muted">Trang chủ</a></li>
                    <li class="breadcrumb-item active text-danger fw-bold" aria-current="page">Sản phẩm</li>
                </ol>
            </nav>
            <h2 class="fw-bold mt-2">Giải pháp bảo hiểm toàn diện</h2>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-4">
            
            <div class="col-lg-3 d-none d-lg-block">
                <div class="category-sidebar sticky-top" style="top: 100px; z-index: 10;">
                    <div class="category-header">
                        <i class="fas fa-bars"></i> Danh mục sản phẩm
                    </div>
                    <ul class="category-list" id="category-list-container">
                        <li class="p-3 text-center text-muted"><i class="fas fa-spinner fa-spin"></i> Đang tải...</li>
                    </ul>
                </div>
                
                <div class="bg-white rounded-3 p-4 mt-4 shadow-sm text-center border">
                    <div class="mb-3 text-danger"><i class="fas fa-headset fa-3x"></i></div>
                    <h6 class="fw-bold">Cần tư vấn ngay?</h6>
                    <p class="small text-muted mb-3">Đội ngũ chuyên gia TIS luôn sẵn sàng hỗ trợ bạn.</p>
                    <a href="tel:19001234" class="btn btn-danger w-100 rounded-pill fw-bold hover-shadow">
                        <i class="fas fa-phone-alt me-2"></i>1900 1234
                    </a>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="d-lg-none mb-3">
                    <button class="btn btn-danger w-100" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCategory">
                        <i class="fas fa-filter me-2"></i> Lọc danh mục
                    </button>
                </div>

                <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 bg-white p-3 rounded-3 shadow-sm border">
                    <h5 class="fw-bold m-0 mb-2 mb-md-0 text-dark ps-2 border-start border-4 border-danger">
                        Tất cả sản phẩm
                    </h5>
                    <div class="d-flex gap-2 w-100 w-md-auto" style="max-width: 400px;">
                        <!-- <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="Tìm kiếm gói bảo hiểm..." onkeyup="searchProducts(this.value)">
                        </div> -->
                    </div>
                </div>

                <div id="product-list" class="row g-3">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-danger" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasCategory">
        <div class="offcanvas-header bg-danger text-white">
            <h5 class="offcanvas-title fw-bold">Danh mục</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
             <ul class="category-list" id="category-list-mobile">
                </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="js/common.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/products.js"></script>

    <script>
        function searchProducts(keyword) {
            const term = keyword.toLowerCase();
            const products = document.querySelectorAll('.product-item-col');
            let found = 0;
            
            products.forEach(col => {
                const title = col.querySelector('.product-title').innerText.toLowerCase();
                if (title.includes(term)) {
                    col.style.display = 'flex'; // Dùng flex để giữ layout
                    found++;
                } else {
                    col.style.display = 'none';
                }
            });

            // Xử lý thông báo không tìm thấy
            let emptyMsg = document.getElementById('empty-search-msg');
            if(found === 0) {
                if(!emptyMsg) {
                    const container = document.getElementById('product-list');
                    emptyMsg = document.createElement('div');
                    emptyMsg.id = 'empty-search-msg';
                    emptyMsg.className = 'col-12 text-center py-5 text-muted';
                    emptyMsg.innerHTML = '<i class="fas fa-search mb-3 fa-3x text-light-gray"></i><p>Không tìm thấy sản phẩm nào phù hợp.</p>';
                    container.appendChild(emptyMsg);
                }
            } else {
                if(emptyMsg) emptyMsg.remove();
            }
        }
    </script>
</body>
</html>
