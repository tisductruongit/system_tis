<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tin tức - TIS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="main-content">
        <div class="admin-card">
            <div class="d-flex justify-content-between mb-4"><h4 class="fw-bold m-0">Bài viết / Tin tức</h4><button class="btn btn-primary" id="btn-add-news"><i class="fas fa-plus"></i> Đăng bài</button></div>
            <div class="row g-4" id="news-list"></div>
        </div>
    </div>
    <div class="modal fade" id="newsModal"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="fw-bold">Đăng Bài Mới</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="news-form"><div class="mb-3"><label>Tiêu đề</label><input type="text" id="n-title" class="form-control" required></div><div class="mb-3"><label>Nội dung</label><textarea id="n-content" class="form-control" rows="5"></textarea></div><div class="mb-3"><label>Ảnh bìa</label><input type="file" id="n-image" class="form-control" accept="image/*"></div></form></div><div class="modal-footer"><button id="btn-submit-news" class="btn btn-primary">Đăng Bài</button></div></div></div></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/common.js"></script>
    <script src="js/core.js"></script>
    <script src="js/news.js"></script>
</body>
</html>
