<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhân sự - TIS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="main-content">
        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Danh sách Nhân sự</h4>
                <button class="btn btn-primary" id="btn-open-add-staff"><i class="fas fa-user-plus"></i> Thêm Nhân viên</button>
            </div>
            <table class="table align-middle">
                <thead class="table-light"><tr><th>Tài khoản (SĐT)</th><th>Họ tên</th><th>Email</th><th>Vai trò</th><th>Trạng thái</th></tr></thead>
                <tbody id="staff-list"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="staffModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title fw-bold">Thêm Nhân Sự</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="staff-form">
                        <div class="mb-3"><label>Tài khoản (SĐT)</label><input type="text" id="s-username" class="form-control" required></div>
                        <div class="mb-3"><label>Họ tên</label><input type="text" id="s-name" class="form-control" required></div>
                        <div class="mb-3"><label>Mật khẩu</label><input type="password" id="s-pass" class="form-control" required></div>
                        <div class="mb-3"><label>Vai trò</label>
                            <select id="s-role" class="form-select">
                                <option value="staff">Nhân viên tư vấn (Staff)</option>
                                <option value="admin">Quản trị viên (Admin)</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer"><button id="btn-submit-staff" class="btn btn-primary">Tạo tài khoản</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/common.js"></script>
    <script src="js/core.js"></script>
    <script src="js/staff.js"></script>
</body>
</html>
