<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - TIS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="main-content">
        <div class="chat-wrapper-global">
            <div class="msgr-sidebar">
                <div class="msgr-sidebar-header">
                    <h4 class="fw-bold mb-0">Messenger</h4>
                    <div class="msgr-search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Tìm kiếm khách hàng...">
                    </div>
                </div>
                <div class="msgr-list" id="conv-list">
                    </div>
            </div>

            <div class="msgr-main">
                <div class="msgr-main-header" id="chat-header">
                    <div class="d-flex align-items-center gap-2">
                        <div class="msgr-avatar-lg" id="header-avatar">?</div>
                        <div>
                            <div class="fw-bold" id="header-name">Chọn hội thoại</div>
                            <div class="msgr-status" id="header-status"><i class="fas fa-circle" style="font-size:0.5rem;color:#65676b;margin-right:5px"></i>Offline</div>
                        </div>
                    </div>
                </div>

                <div class="msgr-chat-box" id="message-box">
                    <div class="msgr-empty">
                        <i class="fab fa-facebook-messenger" style="font-size:4rem;color:#ddd;margin-bottom:15px"></i>
                        <p class="text-muted">Chọn một cuộc trò chuyện để bắt đầu hỗ trợ khách hàng</p>
                    </div>
                </div>

                <div class="msgr-footer" id="input-area" style="display: none;">
                    <div class="msgr-footer-icons">
                        <i class="fas fa-plus-circle" title="Thêm file"></i>
                        <i class="fas fa-image" title="Gửi ảnh"></i>
                    </div>
                    <div class="msgr-input-wrapper">
                        <input type="text" id="msg-input" placeholder="Aa" onkeypress="handleEnter(event)">
                        <i class="fas fa-smile" title="Emoji"></i>
                    </div>
                    <button class="msgr-send-btn" onclick="sendMessage()" title="Gửi">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="js/core.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
