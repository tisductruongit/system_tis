<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TIS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="main-content">
        <div class="container-fluid p-4">
            <h4 class="fw-bold mb-4">Tổng quan hệ thống</h4>
            
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="admin-card stat-border stat-success h-100 p-4 shadow-sm rounded-4 bg-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">Doanh thu</h6>
                                <h3 class="fw-bold text-success mb-0" id="stat-revenue">0 đ</h3>
                            </div>
                            <div class="icon-box bg-success-subtle text-success rounded-circle p-3">
                                <i class="fas fa-wallet fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="admin-card stat-border stat-warning h-100 p-4 shadow-sm rounded-4 bg-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">Đơn chờ duyệt</h6>
                                <h3 class="fw-bold text-warning mb-0" id="stat-pending">0</h3>
                            </div>
                            <div class="icon-box bg-warning-subtle text-warning rounded-circle p-3">
                                <i class="fas fa-clock fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="admin-card stat-border stat-primary h-100 p-4 shadow-sm rounded-4 bg-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">Tổng đơn hàng</h6>
                                <h3 class="fw-bold text-primary mb-0" id="stat-total">0</h3>
                            </div>
                            <div class="icon-box bg-primary-subtle text-primary rounded-circle p-3">
                                <i class="fas fa-shopping-bag fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="admin-card stat-border stat-danger h-100 p-4 shadow-sm rounded-4 bg-white cursor-pointer" 
                         onclick="window.location.href='chat.html'" style="cursor: pointer;">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-2">Hỗ trợ trực tuyến</h6>
                                <h3 class="fw-bold text-danger mb-0">Live Chat</h3>
                            </div>
                            <div class="icon-box bg-danger-subtle text-danger rounded-circle p-3">
                                <i class="fab fa-facebook-messenger fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="admin-card p-4 shadow-sm rounded-4 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0"><i class="fas fa-history me-2 text-muted"></i>Đơn hàng mới nhất</h5>
                    <a href="orders.html" class="btn btn-sm btn-outline-primary rounded-pill px-3">Xem tất cả</a>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                            </tr>
                        </thead>
                        <tbody id="dashboard-orders">
                            <tr><td colspan="5" class="text-center text-muted py-4">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/common.js"></script>
    <script src="js/core.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
