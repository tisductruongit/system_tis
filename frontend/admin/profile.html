<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - TIS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.min.css">
    
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="main-content">
        <div class="row">
            <div class="col-md-6">
                <div class="admin-card">
                    <h5 class="fw-bold border-bottom pb-2 mb-4"><i class="fas fa-user me-2 text-primary"></i>Thông tin cá nhân</h5>
                    <form id="profile-form">
                        <div class="mb-3">
                            <label class="form-label text-muted">Tài khoản (SĐT/Username)</label>
                            <input type="text" id="prof-username" class="form-control bg-light" readonly disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và Tên</label>
                            <input type="text" id="prof-name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" id="prof-email" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary" id="btn-update-profile">Cập nhật thông tin</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="admin-card">
                    <h5 class="fw-bold border-bottom pb-2 mb-4"><i class="fas fa-lock me-2 text-warning"></i>Đổi mật khẩu</h5>
                    <form id="password-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu hiện tại</label>
                            <input type="password" id="old-pass" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu mới</label>
                            <input type="password" id="new-pass" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Xác nhận mật khẩu mới</label>
                            <input type="password" id="confirm-pass" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-warning text-dark fw-bold" id="btn-change-password">Đổi mật khẩu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="../js/common.js"></script>
    <script src="js/core.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
